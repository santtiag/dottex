name: Release

# Se dispara cuando empujas una etiqueta que empieza por "v" (ej. v0.1.0).
on:
  push:
    tags:
      - "v*"

# El token necesita permiso para crear el Release y subir los instaladores.
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon (M1+)
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest # Intel
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-22.04 # Linux: .deb .rpm .AppImage
            args: ""
          - platform: windows-latest # Windows: .msi .exe
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Dependencias de Linux (WebKitGTK)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            librsvg2-dev libayatana-appindicator3-dev build-essential

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          # Solo en macOS se necesitan los dos targets (arm + intel).
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache de Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - run: pnpm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Usa la etiqueta que disparó el workflow (ej. v0.1.0).
          tagName: ${{ github.ref_name }}
          releaseName: "dottex ${{ github.ref_name }}"
          releaseBody: "Ver los cambios abajo. Los instaladores están en Assets."
          releaseDraft: true # Se crea como borrador: revisas y publicas tú.
          prerelease: false
          args: ${{ matrix.args }}
